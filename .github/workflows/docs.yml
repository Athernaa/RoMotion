# Builds the MkDocs site and publishes it to GitHub Pages on every push to
# main. After the first successful run, enable Pages in the repo settings
# (Settings > Pages > Source: "Deploy from a branch" > gh-pages / root).
name: Deploy docs

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install MkDocs Material
        run: pip install mkdocs-material

      - name: Build and deploy to gh-pages
        run: mkdocs gh-deploy --force
