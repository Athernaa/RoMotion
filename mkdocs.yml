# MkDocs configuration for the RoMotion documentation site.
# Builds the docs/ folder into a static site (GitHub Pages).
#
# Local preview:   pip install mkdocs-material  &&  mkdocs serve
# Manual deploy:   mkdocs gh-deploy --force
# (Or let the GitHub Action in .github/workflows/docs.yml deploy on push.)

site_name: RoMotion
site_description: A GSAP-inspired animation & tweening library for Roblox.
# TODO: set these to your GitHub username/repo.
site_url: https://Athernaa.github.io/RoMotion/
repo_url: https://github.com/Athernaa/RoMotion
repo_name: RoMotion
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - tables
  - attr_list

nav:
  - Introduction: introduction.md
  - Installation: installation.md
  - Getting Started: getting-started.md
  - Core Concepts: core-concepts.md
  - Animations:
      - Tweens (to / from / fromTo): tweens.md
      - Configuration Reference: configuration.md
      - Easing: easing.md
      - Keyframes: keyframes.md
      - Stagger: stagger.md
      - Timelines: timelines.md
  - Control:
      - Playback Control: playback-control.md
      - Lifecycle Callbacks: callbacks.md
  - Networking:
      - Global (Networked) Tweens: global-tweens.md
  - Reference:
      - Performance: performance.md
      - API Reference: api-reference.md
      - Troubleshooting & FAQ: troubleshooting.md
